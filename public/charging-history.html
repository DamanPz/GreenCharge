<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charging History - GreenCharge Admin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .sidebar { min-height: calc(100vh - 4rem); }
        tr:nth-child(even) { background-color: #f1f5f9; }
        table th { background-color: #e2e8f0; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; color: #475569; padding: 12px 16px; text-align: left;}
        table td { padding: 12px 16px; color: #334155; font-size: 0.875rem; border-bottom: 1px solid #e2e8f0;}
    </style>
</head>
<body class="font-sans antialiased text-slate-800">

    <!-- Top Navigation -->
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <svg class="h-8 w-8 text-green-600 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <span class="font-bold text-xl text-slate-900">GreenCharge Admin</span>
                    </div>
                </div>
                <div class="flex items-center">
                    <span id="adminName" class="text-sm text-slate-500 mr-4">Welcome, Admin</span>
                    <button onclick="logout()" class="text-sm font-medium text-red-600 hover:text-red-800 focus:outline-none">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex max-w-7xl mx-auto w-full">
        <!-- Sidebar -->
        <div class="w-64 flex-shrink-0 sidebar bg-white border-r border-slate-200 hidden md:block">
            <div class="pt-6 pb-4">
                <ul class="space-y-1">
                    <li>
                        <a href="admin-dashboard.html" class="flex items-center px-6 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors">
                            <svg class="h-5 w-5 mr-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                            </svg>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="charging-history.html" class="flex items-center px-6 py-3 text-sm font-medium text-green-700 bg-green-50 border-r-4 border-green-600 transition-colors">
                            <svg class="h-5 w-5 mr-3 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Charging History
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 w-full bg-slate-50 p-8">
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Charging History</h1>
                    <p class="text-sm text-slate-500 mt-1">Detailed log of all completed charging sessions.</p>
                </div>
            </div>

            <!-- History Table -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full" id="historyTable">
                        <thead>
                            <tr>
                                <th>Station Name</th>
                                <th>Start Time</th>
                                <th>End Time</th>
                                <th>Duration (mins)</th>
                                <th>Energy (kWh)</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <!-- Rows injected here via JS -->
                            <tr>
                                <td colspan="5" class="text-center py-6 text-slate-400">Loading history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth & Logic Script -->
    <script>
        // IMMEDIATE Auth Guard
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.replace('/admin-login.html');
        }

        // BFCache / Pageshow Detection
        window.addEventListener('pageshow', function (event) {
            if (event.persisted || sessionStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.replace('/admin-login.html');
            }
        });

        // Load History
        document.addEventListener('DOMContentLoaded', () => {
            fetchHistory();
        });

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.history.replaceState(null, "", "/admin-login.html");
            window.location.replace('/admin-login.html');
        }

        function formatDateTime(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        async function fetchHistory() {
            try {
                const response = await fetch('/api/sessions');
                if (!response.ok) throw new Error('Failed to fetch sessions');
                const sessions = await response.json();
                
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = ''; // Clear loading message

                if (sessions.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-slate-400">No charging history recorded yet.</td></tr>`;
                    return;
                }

                sessions.forEach(session => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td class="font-medium text-slate-800">${session.station}</td>
                        <td class="text-slate-500">${formatDateTime(session.startTime)}</td>
                        <td class="text-slate-500">${formatDateTime(session.endTime)}</td>
                        <td class="text-slate-600 font-medium">${session.durationMinutes} min</td>
                        <td class="text-green-600 font-bold">${session.energyDelivered.toFixed(1)} kWh</td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error('Error loading history:', error);
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-red-500">Failed to load charging history. Check console.</td></tr>`;
            }
        }
    </script>
</body>
</html>
